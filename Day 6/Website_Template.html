<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=Edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
        <title>Coffee Break</title>
    
        <style>       
            *{
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            section{
                margin:0%;
                padding: auto;
                
            }

            .headermain{
                padding: 5;
                margin: 5;
                display: flex;
                justify-content: left;
                background-color: rgba(20, 20, 20, 0.705);
                height: 70px;
                align-items: center;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                z-index: 100;
            }

            .headermain a{
                text-decoration: none;
                color: white;
                font-size: 20px;
            }

            .logo{
                height: 80px;
                width: 200px;
                display: flex;
                justify-content: center;
                align-items: center;
                
            }

            .logo img{
                height: 145px;
                width: auto;
            }

            .nav{
                height: 60px;
                width: 500px;
                display:flex;
                margin-left: 10px;
                justify-content: space-evenly;
                align-items: center;
            }

            .nav a{
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 10px 16px;
                color: white;
                text-decoration: none;
                border-radius: 8px;
                transition: background 0.2s ease, transform 0.2s ease;
            }

            .nav a:hover{
                background: rgba(255,255,255,0.18);
                transform: translateY(-1px);
            }

            .nav a + a {
                margin-left: 8px;
            }

            .search {
                position: relative;
                display: inline-flex;
                align-items: center;
                margin-left: 10px;
                width: 250px;
                height: 48px;
                padding: 0 12px;
                border: 0.6px solid rgba(255, 255, 255, 0.08);
                border-radius: 10px;
                box-shadow: 0 0 0 1.5px rgba(255, 255, 255, 0.08), 0 0 25px -17px;
                transition: all 0.25s cubic-bezier(0.19, 1, 0.22, 1);
            }

            .search-icon {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                fill: white;
                width: 18px;
                height: 20px;
                pointer-events: none;
                z-index: 1;
            }

            .search-input {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                font-size: 20px;
                width: 100%;
                height: 100%;
                padding-left: 42px;
                border: none;
                background: transparent;
                outline: none;
                color: white;
                cursor: text;
                z-index: 0;
            }

            .search-input::placeholder {
                color: white;
            }

            .search:active {
                transform: scale(0.95);
                
            }
            .search:hover,
            .search:focus-within {
                border: 0.6px solid rgba(20, 20, 20, 0.705);
                box-shadow: 0 0 0 1.5px rgba(20, 20, 20, 0.705), 0 0 25px -17px;
            }


            .info{
                height: 60px;
                width: 300px;
                display:flex;
                margin-left: auto;
                justify-content: space-evenly;
                align-items: center;
            }

            .info a{
                display: inline-flex;
                align-items: center;
                justify-content: center;
                padding: 10px 16px;
                color: white;
                text-decoration: none;
                border-radius: 8px;
                transition: background 0.2s ease, transform 0.2s ease;
            }

            .info a:hover{
                background: rgba(255,255,255,0.18);
                transform: translateY(-1px);
            }

            .info a + a {
                margin-left: 8px;
            }


            .settings{
                height: 60px;
                width: 60px;
                display:flex;
                margin-left: 10px;
                justify-content: center;
                align-items: center;
            }

            .settings-toggle{
                display: inline-flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                width: 36px;
                height: 36px;
                padding: 6px;
                border: none;
                background: rgba(255,255,255,0.1);
                cursor: pointer;
                border-radius: 8px;
                transition: background 0.2s ease, transform 0.2s ease;
            }

            .settings-toggle:hover{
                background: rgba(255,255,255,0.2);
                transform: translateY(-1px);
            }

            .settings-toggle span{
                display: block;
                width: 18px;
                height: 2px;
                margin: 3px 0;
                background: white;
                border-radius: 2px;
            }

        
            .slider{
                width: 100%;
                height: 100vh;
                overflow: hidden;
                position: relative;
            }

            .mySlides{
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0;
                left: 100%;
                animation: sliderAnimation 16s infinite;
            }

            .mySlides:nth-child(1){
                animation-delay: 0s;
            }

            .mySlides:nth-child(2){
                animation-delay: 4s;
            }

            .mySlides:nth-child(3){
                animation-delay: 8s;
            }

            .mySlides:nth-child(4){
                animation-delay: 12s;
            }

            @keyframes sliderAnimation{

                0%{
                    left: 100%;
                }

                5%{
                    left: 0%;
                }

                25%{
                    left: 0%;
                }

                30%{
                    left: -100%;
                }

                30.01%{
                    left: 100%;
                }

                100%{
                    left: 100%;
                }
            }

           
            .mySlides img{
                width: 100%;
                height: 100%;
                object-fit: cover;
                background-size: contain;
                display: block;
            }

            .prev, .next{
                position: absolute;
                top: 50%;
                transform: translateY(-50%);
                color: white;
                font-size: 30px;
                padding: 10px;
                cursor: pointer;
                background-color: rgba(0,0,0,0.5);
                user-select: none;
            }

            .prev{
                left: 10px;
            }

            .next{
                right: 10px;
            }            
        
            TABLE{
                height: 400px;
                margin-top: 20px;
            }
            table{
                width: 60%;
                border-collapse: collapse;
                margin: 20px auto;
            }

            th, td{
                border: 2px solid black;
                padding: 10px;
                text-align: center;
            }

            th{
                background-color: rgb(226, 173, 107);
                color: #666666;
                
            }

            tr:hover{
                background-color: rgb(250, 232, 208);
            }

        </style>
    
    </head>

    <body>
        <header>
            <div class="first">
                <div class="headermain">
                    <a href="Website_Template.html" class="logo"><img src="Images\logo.png" alt="CoffeeBreak Logo"></a>
                                
                    <div class="nav">
                        <a href="Website_Template.html">Home</a>
                        <a href="menu.html">Menu</a>
                        <a href="#order">Order</a>
                        <a href="contact.html">Contact Us</a>
                    </div>
                    <div class="search">
                        <svg viewBox="0 0 24 24" aria-hidden="true" class="search-icon">
                            <g>
                            <path
                                d="M21.53 20.47l-3.66-3.66C19.195 15.24 20 13.214 20 11c0-4.97-4.03-9-9-9s-9 4.03-9 9 4.03 9 9 9c2.215 0 4.24-.804 5.808-2.13l3.66 3.66c.147.146.34.22.53.22s.385-.073.53-.22c.295-.293.295-.767.002-1.06zM3.5 11c0-4.135 3.365-7.5 7.5-7.5s7.5 3.365 7.5 7.5-3.365 7.5-7.5 7.5-7.5-3.365-7.5-7.5z"
                            ></path>
                            </g>
                        </svg>

                        <input
                            id="query"
                            class="search-input"
                            type="search"
                            placeholder="Search..."
                            name="searchbar"
                        />
                    </div>
                    <div class="info"> 
                        <a href="#cart">Cart</a>
                        <a href="signup.html">Login</a>
                    </div>
                    <div class="settings">
                        <button class="settings-toggle" aria-label="Open settings">
                            <span></span>
                            <span></span>
                            <span></span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

            <div class="second">
                <div class="slider">
                    <div class="mySlides">
                        <img src="Images\coffee.png">
                        <div class="Info_overlay">
                            <!-- <h2>Coffee</h2> -->
                        </div>
                    </div>

                    <div class="mySlides">
                        <img src="Images\chocolate.png">
                        <div class="info-overlay">
                            <!-- <h3>Chocolate</h3> -->
                        </div>
                    </div>

                    <div class="mySlides">
                        <img src="Images\croissant.png">
                        <div class="info-overlay">
                            <!-- <h3>Croissant</h3> -->
                        </div>
                    </div>

                    <div class="mySlides">
                        <img src="Images\macaron.png">
                        <div class="info-overlay">
                            <!-- <h3>Macaron</h3> -->
                        </div>
                    </div>

                    <!-- Navigation Buttons -->
                    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                    <a class="next" onclick="plusSlides(1)">&#10095;</a>
                </div>
            </div>
             
            <div class="TABLE">
                <table>

                        </td>
                    </tr>
                </table>
            </div>

        
        <script>
            let slideIndex = 1;
            const slider = document.querySelector('.slider');
            const slides = document.querySelectorAll('.mySlides');
            const totalSlides = slides.length;

            showSlides(slideIndex);

            function plusSlides(n) {
                slider.classList.add('manual');
                slideIndex += n;
                showSlides(slideIndex);
            }

            function showSlides(n) {
                if (n > totalSlides) {
                    slideIndex = 1;
                }
                if (n < 1) {
                    slideIndex = totalSlides;
                }

                slides.forEach(slide => {
                    slide.classList.remove('active');
                });

                slides[slideIndex - 1].classList.add('active');
            }
        </script>

    </body>
</html>
